<!DOCTYPE html>
<html>
<head>
<title>pixel shooter</title>
<style>

body{
margin:0;
overflow:hidden;
cursor:none;
background:#222;
font-family:monospace;
color:white;
}

#game{
width:100vw;
height:100vh;
position:relative;
background:
linear-gradient(#333 2px, transparent 2px),
linear-gradient(90deg,#333 2px, transparent 2px);
background-size:40px 40px;
background-color:#1b1b1b;
}

#crosshair{
position:absolute;
width:30px;
height:30px;
transform:translate(-50%,-50%);
pointer-events:none;
}

#crosshair:before{
content:"";
position:absolute;
background:#00ffcc;
width:2px;
height:30px;
left:14px;
}

#crosshair:after{
content:"";
position:absolute;
background:#00ffcc;
width:30px;
height:2px;
top:14px;
}

#gun{
position:absolute;
font-size:70px;
pointer-events:none;
}

.enemy{
position:absolute;
font-size:40px;
}

.explosion{
position:absolute;
font-size:40px;
animation:boom 0.4s forwards;
}

@keyframes boom{
0%{transform:scale(1)}
100%{transform:scale(2);opacity:0}
}

#hud{
position:absolute;
top:10px;
left:20px;
font-size:18px;
}

button{
position:absolute;
top:10px;
right:20px;
}

</style>
</head>
<body>

<div id="game">

<div id="hud">
score: <span id="score">0</span><br>
level: <span id="level">1</span><br>
time: <span id="time">30</span>
</div>

<button onclick="start()">start</button>

<div id="crosshair"></div>
<div id="gun">🔫</div>

</div>

<script>

var score=0
var level=1
var time=30
var gameRunning=false
var speed=1200

var game=document.getElementById("game")
var gun=document.getElementById("gun")
var crosshair=document.getElementById("crosshair")

var scoreText=document.getElementById("score")
var levelText=document.getElementById("level")
var timeText=document.getElementById("time")

document.addEventListener("mousemove",function(e){

var x=e.clientX
var y=e.clientY

crosshair.style.left=x+"px"
crosshair.style.top=y+"px"

gun.style.left=(x-30)+"px"
gun.style.top=(y+20)+"px"

})

game.onclick=function(){

if(gameRunning==false)return

gun.style.top=(parseInt(gun.style.top)+10)+"px"

setTimeout(function(){

gun.style.top=(parseInt(gun.style.top)-10)+"px"

},80)

}

function start(){

score=0
level=1
time=30
speed=1200
gameRunning=true

scoreText.innerText=score
levelText.innerText=level
timeText.innerText=time

spawn()

var t=setInterval(function(){

time=time-1
timeText.innerText=time

if(time<=0){

clearInterval(t)
gameRunning=false
alert("game over lol score "+score)

}

},1000)

}

function spawn(){

if(gameRunning==false)return

var enemy=document.createElement("div")
enemy.className="enemy"

var arr=["👾","🤖","👹","👽"]
enemy.innerText=arr[Math.floor(Math.random()*arr.length)]

var x=Math.random()*window.innerWidth
var y=Math.random()*window.innerHeight

enemy.style.left=x+"px"
enemy.style.top=y+"px"

enemy.onclick=function(e){

e.stopPropagation()

score=score+1
scoreText.innerText=score

var boom=document.createElement("div")
boom.className="explosion"
boom.innerText="💥"

boom.style.left=x+"px"
boom.style.top=y+"px"

game.appendChild(boom)

setTimeout(function(){
boom.remove()
},300)

enemy.remove()

if(score%8==0){

level=level+1
levelText.innerText=level
speed=speed-100

}

}

game.appendChild(enemy)

setTimeout(function(){
enemy.remove()
},1500)

setTimeout(spawn,speed)

}

</script>

</body>
</html>
